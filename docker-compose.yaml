version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: chirpy-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chirpy
    ports:
      - "5433:5432"
    volumes:
      - chirpy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chirpy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chirpy_postgres_data:
